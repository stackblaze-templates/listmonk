services:
  listmonk:
    image: listmonk/listmonk:v6.1.0
    ports:
      - "9000:9000"
    environment:
      - LISTMONK_db__host=db
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=${POSTGRES_USER:-listmonk}
      - LISTMONK_db__password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - LISTMONK_db__database=${POSTGRES_DB:-listmonk}
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-listmonk}
      POSTGRES_USER: ${POSTGRES_USER:-listmonk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
